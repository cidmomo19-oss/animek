<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-3xl mx-auto bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-indigo-400">🔥 Tambah Judul Baru</h1>
        
        <form id="addShowForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Judul</label>
                    <input type="text" id="title" required class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">URL Poster</label>
                    <input type="url" id="poster_url" required class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Kategori</label>
                    <select id="category" class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500">
                        <option value="Anime">Anime</option>
                        <option value="Movie">Movie</option>
                        <option value="Series">Series</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Tahun Rilis</label>
                    <input type="number" id="release_year" required class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Genre (Pisahkan koma)</label>
                    <input type="text" id="genre" placeholder="Action, Fantasy" required class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Studio</label>
                    <input type="text" id="studio" required class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Sinopsis</label>
                <textarea id="synopsis" rows="4" required class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:outline-none focus:border-indigo-500"></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded transition-colors">
                Simpan Judul
            </button>
        </form>
    </div>

    <script>
        document.getElementById('addShowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                title: document.getElementById('title').value,
                poster_url: document.getElementById('poster_url').value,
                category: document.getElementById('category').value,
                release_year: parseInt(document.getElementById('release_year').value),
                genre: document.getElementById('genre').value,
                studio: document.getElementById('studio').value,
                synopsis: document.getElementById('synopsis').value
            };

            const btn = e.target.querySelector('button');
            btn.innerText = "Menyimpan...";

            try {
                const res = await fetch('/api/shows', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await res.json();
                if(result.success) {
                    alert("Berhasil disimpan Bang!");
                    e.target.reset();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (err) {
                alert("Gagal konek ke API!");
            } finally {
                btn.innerText = "Simpan Judul";
            }
        });
    </script>
</body>
</html>
